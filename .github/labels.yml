# GitHub Labels Configuration
# Used by the label-sync workflow (.github/workflows/label-sync.yml)
# Reference: https://github.com/EndBug/label-sync

# ---------------------------------------------------------------------------
# Type Labels
# ---------------------------------------------------------------------------
- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: feature
  color: "0e8a16"
  description: New feature or enhancement

- name: documentation
  color: "0075ca"
  description: Documentation improvements

- name: maintenance
  color: "e4e669"
  description: Code cleanup or refactoring

- name: testing
  color: "6f42c1"
  description: Testing improvements

- name: security
  color: "b60205"
  description: Security-related issues

# ---------------------------------------------------------------------------
# Priority Labels
# ---------------------------------------------------------------------------
- name: "priority: critical"
  color: "b60205"
  description: Blocks MVP/production

- name: "priority: high"
  color: "e4530a"
  description: Important for next release

- name: "priority: medium"
  color: "fbca04"
  description: Should be done soon

- name: "priority: low"
  color: "c2e0c6"
  description: Nice to have

# ---------------------------------------------------------------------------
# Component Labels (aligned with PROJECT_PLAN.md work packages)
