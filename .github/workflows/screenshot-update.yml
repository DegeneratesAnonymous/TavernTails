name: Update Screenshots

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    name: Capture & Commit Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt

      - name: Apply database migrations
        env:
          TAVERNTAILS_DATABASE_URL: sqlite:///./taverntails_screenshots.db
        working-directory: server
        run: |
          python tools/init_db.py
          python -m alembic upgrade head

      - name: Start backend
        env:
          TAVERNTAILS_DATABASE_URL: sqlite:///./taverntails_screenshots.db
        run: |
          python -m uvicorn server.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/backend.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/ > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start" && exit 1

      # ── Frontend setup ────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          REACT_APP_API_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Serve built frontend
        run: |
          npx --yes serve -s client/build -l 3000 &
          echo $! > /tmp/serve.pid

      - name: Wait for frontend
        run: |
          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:3000/ > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start" && exit 1

      # ── Screenshot capture ────────────────────────────────────────────────
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture screenshots
        env:
          BASE_URL: http://127.0.0.1:3000
        run: node tools/take_screenshots.mjs

      # ── Upload logs on failure ────────────────────────────────────────────
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

      # ── Commit screenshots back ───────────────────────────────────────────
      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "docs: update screenshots [skip ci]"
            git push
          fi

      # ── Update wiki pages ─────────────────────────────────────────────────
      - name: Clone wiki
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: Generate wiki pages
        run: node tools/update_wiki.mjs wiki

      - name: Commit and push wiki
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "docs: refresh wiki pages [skip ci]"
            git push
          fi
