name: Build & Deploy Staging

# Runs on every push to main or develop.
# Always builds and pushes a Docker image to GitHub Container Registry (GHCR).
# Optionally deploys to a remote server via SSH when the repository variable
# STAGING_DEPLOY_ENABLED is set to "true" and the required SSH secrets are
# provided (see the "Staging server setup" section of docs/STAGING.md).

on:
  push:
    branches: [main, develop]

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  # ── Job 1: build the Docker image and push it to GHCR ─────────────────────
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # branch name tag  (e.g. main, develop)
            type=ref,event=branch
            # short commit SHA tag
            type=sha,prefix=sha-,format=short
            # "latest" only for the main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: (optional) SSH into a staging server and redeploy ──────────────
  # Enable by setting the repository variable STAGING_DEPLOY_ENABLED=true and
  # configuring the secrets described in docs/STAGING.md.
  deploy:
    name: Deploy to staging server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.ref == 'refs/heads/main' &&
      vars.STAGING_DEPLOY_ENABLED == 'true'
    environment: staging

    steps:
      - name: Redeploy container via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker pull "$IMAGE"
            docker stop taverntails-staging 2>/dev/null || true
            docker rm   taverntails-staging 2>/dev/null || true
            docker run -d \
              --name taverntails-staging \
              --restart unless-stopped \
              -p 8000:8000 \
              -v taverntails_data:/app/data \
              -e TAVERNTAILS_SECRET="$TAVERNTAILS_SECRET" \
              -e OPENAI_API_KEY="$OPENAI_API_KEY" \
              "$IMAGE"
            echo "✅ taverntails-staging is running at http://$(hostname -I | awk '{print $1}'):8000"
