name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt

      - name: Lint with ruff
        run: |
          ruff check server/

      - name: Type check with mypy (non-blocking)
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: |
          python -m mypy server --exclude 'server/agents/archive' --ignore-missing-imports --check-untyped-defs

      - name: Run backend tests
        run: |
          python -m pytest server/tests -q

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ '18', '20' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Lint with ESLint
        working-directory: client
        run: npm run lint --if-present || echo "Lint script not found, skipping"

      - name: Type check with TypeScript
        if: matrix.node-version == '20'
        working-directory: client
        run: npx tsc --noEmit

      - name: Run frontend tests
        working-directory: client
        env:
          CI: 'true'
        run: npm test -- --watchAll=false

      - name: Build frontend
        if: matrix.node-version == '20'
        working-directory: client
        run: npm run build

      - name: Archive production build
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build

  smoke:
    name: API Smoke Upload
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt

      - name: Apply migrations
        env:
          TAVERNTAILS_DATABASE_URL: sqlite:///./taverntails_ci.db
        working-directory: server
        run: |
          python tools/init_db.py
          python -m alembic upgrade head

      - name: Start backend
        env:
          TAVERNTAILS_DATABASE_URL: sqlite:///./taverntails_ci.db
        run: |
          python -m uvicorn server.main:app --host 127.0.0.1 --port 8000 &
          echo $! > uvicorn.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Run smoke upload
        env:
          PYTHONPATH: .
          TAVERNTAILS_DATABASE_URL: sqlite:///./taverntails_ci.db
        run: |
          python server/tools/smoke_upload.py

      - name: Stop backend
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill $(cat uvicorn.pid) || true
          fi
