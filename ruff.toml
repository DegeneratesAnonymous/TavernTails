# Ruff configuration for TavernTAIls backend
# See: https://docs.astral.sh/ruff/configuration/

# Line length
line-length = 120

# Exclude common directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "*.egg-info",
    ".pytest_cache",
    "alembic/versions",
    "server/alembic/versions",
    "server/agents/archive",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # FastAPI's Depends(...) in parameters is intentional
    "UP006", # Allow typing.List/Dict for now; avoid mass refactors
    "UP007", # Allow Optional[...] etc. for now
    "UP035", # Allow legacy typing imports for now
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"server/tests/*" = ["F401", "F811"]  # Allow test-specific patterns
"server/main.py" = ["E402"]  # Imports after app creation to avoid circular imports
"server/agents/content.py" = ["E402", "N815", "N806"]  # Imports after router creation, camelCase for API

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"
