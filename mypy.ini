# Mypy configuration for TavernTAIls backend
# See: https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
python_version = 3.11
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = true

# Gradually increase strictness over time
# For beginner-friendly setup, we start lenient
strict = false
warn_redundant_casts = true
warn_unused_ignores = false
warn_no_return = true

# Per-module settings - add as needed
# [mypy-server.agents.*]
# disallow_untyped_defs = true

[mypy-server.agents.archive.*]
ignore_errors = true

# When mypy is invoked on a path (e.g. `.../server`), module names can be rooted at
# that directory (e.g. `agents.*`, `tests.*`). Keep these in sync with the patterns above.
[mypy-agents.archive.*]
ignore_errors = true

[mypy-server.tests.*]
ignore_errors = true
[mypy-tests.*]
ignore_errors = true

[mypy-server.scripts.*]
ignore_errors = true
[mypy-scripts.*]
ignore_errors = true

[mypy-server.tools.*]
ignore_errors = true
[mypy-tools.*]
ignore_errors = true

[mypy-server.alembic.*]
ignore_errors = true
[mypy-alembic.*]
ignore_errors = true

# Alternate player implementations (not wired into main router)
[mypy-server.agents.player_clean]
ignore_errors = true
[mypy-server.agents.player_v2]
ignore_errors = true
[mypy-agents.player_clean]
ignore_errors = true
[mypy-agents.player_v2]
ignore_errors = true
